server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Serve SPA and support client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Railway backend (backend has context-path /ecommerce)
    location /api/ {
        proxy_pass https://ecommerce-service-production-d273.up.railway.app/ecommerce/api/;
        proxy_set_header Host ecommerce-service-production-d273.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_ssl_server_name on;
        proxy_read_timeout 90;
    }

    # Static assets caching
    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /health {
        add_header Content-Type text/plain;
        return 200 'OK';
    }
}

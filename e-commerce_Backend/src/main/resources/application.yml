server:
  port: ${PORT:8080}
  servlet:
    context-path: /ecommerce
    session:
      timeout: 30m

spring:
  application:
    name: ecommerce
  datasource:

    url: jdbc:mysql://${DB_HOST:localhost}:3306/ecommerce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  mail:
    enabled: true
    host: smtp.gmail.com
    port: 587
    username: ${YOUR_MAIL_USERNAME}
    password: ${YOUR_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.transaction: TRACE

api:
  info:
    title: Hung Hypebeast API
    description: E-commerce Backend API for Hung Hypebeast
    version: 1.0.0
    contact:
      name: TungTS17
      email: tungts17@fpt.com
  server:
    # Tự động điều chỉnh URL server tùy theo môi trường
    url: ${API_SERVER_URL:http://localhost:8080}

inventory:
  reservation:
    expiry-minutes: ${RESERVATION_EXPIRY_MINUTES:1}

app:
  order:
    tracking:
      # Sử dụng BASE_URL linh hoạt để không bị cứng nhắc localhost
      base-url: ${APP_ORDER_BASE_URL:http://localhost:8080/ecommerce/api/v1/public/orders}

